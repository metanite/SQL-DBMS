<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL-DBMS</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --error: #f85149;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header .status {
      font-size: 12px;
      color: var(--muted);
    }
    .container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 200px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
    }
    .table-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .table-item {
      padding: 8px 16px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
    }
    .table-item:hover { background: #1f242c; }
    .table-item.active { background: #1c3a5c; color: var(--accent); }
    .table-item::before {
      content: "▦";
      font-size: 10px;
      color: var(--muted);
    }
    .table-item.active::before { color: var(--accent); }
    .schema-details {
      max-height: 40%;
      border-top: 1px solid var(--border);
      overflow-y: auto;
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .schema-details .detail-header {
      padding: 10px 16px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }
    .schema-details table {
      width: 100%;
      border-collapse: collapse;
    }
    .schema-details th, .schema-details td {
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .schema-details th {
      color: var(--muted);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
    }
    .schema-details td { font-size: 11px; }
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .editor-panel {
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toolbar button:hover { background: var(--accent-hover); }
    .toolbar button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .toolbar button.secondary:hover { background: #1f242c; }
    .toolbar .spacer { flex: 1; }
    .toolbar .shortcut {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .query-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 16px 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .query-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: var(--bg);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .query-tab.active {
      background: var(--panel);
      color: var(--text);
      border-color: var(--border);
    }
    .query-tab:hover:not(.active) {
      background: #1f242c;
      color: var(--text);
    }
    .query-tab .close {
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      border-radius: 2px;
    }
    .query-tab .close:hover {
      background: var(--border);
      color: var(--error);
    }
    .new-tab-btn {
      padding: 4px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }
    .new-tab-btn:hover {
      background: #1f242c;
      color: var(--text);
    }
    textarea {
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      flex: 1;
      min-height: 280px;
    }
    textarea::placeholder { color: #484f58; }

    /* Results */
    .results-panel {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }
    .results-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .results-tabs button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .results-tabs button.active {
      background: var(--panel);
      color: var(--text);
      border-color: var(--border);
    }
    .result-section { display: none; }
    .result-section.active { display: block; }

    .data-grid {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .data-grid th, .data-grid td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-grid th {
      background: var(--panel);
      color: var(--muted);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      position: sticky;
      top: 0;
    }
    .data-grid tr:hover td { background: #1f242c; }
    .data-grid .null { color: #484f58; font-style: italic; }

    .text-output {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--text);
    }
    .text-output.success { color: var(--success); }
    .text-output.error { color: var(--error); }

    .query-tag {
      display: inline-block;
      background: var(--panel);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      margin-bottom: 8px;
      color: var(--muted);
    }

    .multi-results > div {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .multi-results > div:last-child {
      border-bottom: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>SQL-DBMS</h1>
    <span class="status" id="status">Ready</span>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">Tables</div>
      <div class="table-list" id="tableList">
        <div class="empty-state">Loading tables…</div>
      </div>
      <div class="schema-details" id="schemaDetails"></div>
    </aside>

    <main class="main">
      <div class="editor-panel" style="flex: 0 0 auto;">
        <div class="query-tabs" id="queryTabs"></div>
        <div class="toolbar">
          <button onclick="executeQuery()">▶ Execute</button>
          <button class="secondary" onclick="executeAllQueries()">Execute All</button>
          <button class="secondary" onclick="clearEditor()">Clear</button>
          <div class="spacer"></div>
          <span class="shortcut">Ctrl+Enter to run current</span>
        </div>
        <textarea id="editor" placeholder="-- Type your SQL here
-- Example: SELECT * FROM account;
-- Press Ctrl+Enter to execute"></textarea>
      </div>

      <div class="results-panel" id="resultsPanel">
        <div class="empty-state" style="padding-top: 40px;">Results will appear here after you execute a query.</div>
      </div>
    </main>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const resultsPanel = document.getElementById('resultsPanel');
    const tableList = document.getElementById('tableList');
    const schemaDetails = document.getElementById('schemaDetails');
    const status = document.getElementById('status');

    // ── Tab management ───────────────────────────────────────────────────────
    let tabs = [{ id: 1, name: 'Query 1', content: '' }];
    let nextTabId = 2;
    let activeTabId = 1;

    function getActiveTab() {
      return tabs.find(t => t.id === activeTabId);
    }

    function renderTabs() {
      const container = document.getElementById('queryTabs');
      const tabsHtml = tabs.map(t =>
        `<div class="query-tab ${t.id === activeTabId ? 'active' : ''}" onclick="switchTab(${t.id})" title="${escapeHtml(t.name)}">` +
        `${escapeHtml(t.name)}` +
        `${tabs.length > 1 ? `<span class="close" onclick="event.stopPropagation(); closeTab(${t.id})">&times;</span>` : ''}` +
        `</div>`
      ).join('');
      container.innerHTML = tabsHtml + `<button class="new-tab-btn" onclick="addTab()" title="New query tab">+</button>`;
    }

    function addTab() {
      const active = getActiveTab();
      if (active) active.content = editor.value;

      const id = nextTabId++;
      tabs.push({ id, name: `Query ${id}`, content: '' });
      activeTabId = id;
      editor.value = '';
      renderTabs();
      editor.focus();
    }

    function closeTab(id) {
      if (tabs.length <= 1) return;
      const idx = tabs.findIndex(t => t.id === id);
      if (idx === -1) return;

      tabs.splice(idx, 1);
      if (activeTabId === id) {
        const newIdx = Math.max(0, idx - 1);
        activeTabId = tabs[newIdx].id;
        editor.value = tabs[newIdx].content;
      }
      renderTabs();
      editor.focus();
    }

    function switchTab(id) {
      if (id === activeTabId) return;
      const active = getActiveTab();
      if (active) active.content = editor.value;

      activeTabId = id;
      const target = tabs.find(t => t.id === id);
      editor.value = target ? target.content : '';
      renderTabs();
      editor.focus();
    }

    // ── Schema loading ───────────────────────────────────────────────────────
    async function loadTables() {
      try {
        const res = await fetch('/api/schema');
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          tableList.innerHTML = '<div class="empty-state">Error loading tables: server returned HTML instead of JSON</div>';
          return;
        }
        const data = await res.json();
        if (!data.tables || data.tables.length === 0) {
          tableList.innerHTML = '<div class="empty-state">No tables found.<br>Use CREATE TABLE to add one.</div>';
          return;
        }
        tableList.innerHTML = data.tables.map(t =>
          `<div class="table-item" data-name="${escapeHtml(t)}" onclick="selectTable('${escapeHtml(t)}')">${escapeHtml(t)}</div>`
        ).join('');
      } catch (e) {
        tableList.innerHTML = '<div class="empty-state">Error loading tables</div>';
      }
    }

    async function selectTable(name) {
      document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
      const el = document.querySelector(`.table-item[data-name="${CSS.escape(name)}"]`);
      if (el) el.classList.add('active');

      try {
        const res = await fetch(`/api/schema/${encodeURIComponent(name)}`);
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          schemaDetails.innerHTML = `<div class="detail-header">${escapeHtml(name)}</div><div style="padding:12px;color:var(--error)">Server returned HTML instead of JSON</div>`;
          return;
        }
        const data = await res.json();
        if (data.error) {
          schemaDetails.innerHTML = `<div class="detail-header">${escapeHtml(name)}</div><div style="padding:12px;color:var(--error)">${escapeHtml(data.error)}</div>`;
          return;
        }
        if (Array.isArray(data)) {
          const rows = data.map(col =>
            `<tr><td>${escapeHtml(col.name)}</td><td>${escapeHtml(col.type)}</td><td>${escapeHtml(col.null)}</td><td>${escapeHtml(col.key)}</td><td>${escapeHtml(col.default)}</td></tr>`
          ).join('');
          schemaDetails.innerHTML = `
            <div class="detail-header">${escapeHtml(name)}</div>
            <table><thead><tr><th>Column</th><th>Type</th><th>Null</th><th>Key</th><th>Default</th></tr></thead>
            <tbody>${rows}</tbody></table>`;
        }
      } catch (e) {
        schemaDetails.innerHTML = `<div class="detail-header">${escapeHtml(name)}</div><div style="padding:12px;color:var(--error)">Error loading schema</div>`;
      }
    }

    // ── Query execution ──────────────────────────────────────────────────────
    function getActiveQuery() {
      const text = editor.value;
      const selStart = editor.selectionStart;
      const selEnd = editor.selectionEnd;

      // Use selection if present and non-empty
      if (selStart !== selEnd) {
        const selected = text.substring(selStart, selEnd).trim();
        if (selected) return selected;
      }

      // Find the current query at cursor position (split by semicolons)
      let currentStart = 0;
      for (let i = 0; i <= text.length; i++) {
        if (i === text.length || text[i] === ';') {
          const segmentEnd = i === text.length ? i : i + 1;
          if (selStart >= currentStart && selStart <= segmentEnd) {
            const query = text.substring(currentStart, segmentEnd).trim();
            if (/[^;\s]/.test(query)) return query;
          }
          currentStart = segmentEnd;
        }
      }

      // Fallback: return the last non-empty statement
      const queries = text.split(';').map(q => q.trim()).filter(q => /[^;\s]/.test(q));
      if (queries.length) return queries[queries.length - 1];

      return text.trim();
    }

    async function executeQuery() {
      const query = getActiveQuery();
      await _runQuery(query, 'current');
    }

    async function executeAllQueries() {
      const query = editor.value.trim();
      await _runQuery(query, 'all');
    }

    async function _runQuery(query, mode) {
      if (!query) return;

      status.textContent = 'Running…';
      resultsPanel.innerHTML = '<div class="empty-state">Executing…</div>';

      try {
        const res = await fetch('/api/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          const text = await res.text();
          resultsPanel.innerHTML = `<div class="text-output error">Server error: received HTML (status ${res.status}) instead of JSON. Make sure the backend server is running correctly.</div>`;
          status.textContent = 'Error';
          return;
        }

        const data = await res.json();
        renderResults(data.results || []);
        status.textContent = `${(data.results || []).length} statement(s) executed` + (mode === 'current' ? ' (current)' : '');
        loadTables(); // Refresh schema in case of DDL
      } catch (e) {
        resultsPanel.innerHTML = `<div class="text-output error">Network error: ${escapeHtml(e.message)}</div>`;
        status.textContent = 'Error';
      }
    }

    function renderResults(results) {
      if (!results.length) {
        resultsPanel.innerHTML = '<div class="empty-state">No results.</div>';
        return;
      }

      const html = results.map((r, i) => {
        let body = '';
        if (!r.ok) {
          body = `<div class="text-output error">${escapeHtml(r.error)}</div>`;
        } else if (r.type === 'table') {
          const headers = r.parsed?.headers || [];
          const rows = r.parsed?.rows || [];
          if (!headers.length) {
            body = '<div class="text-output">(empty result set)</div>';
          } else {
            const th = headers.map(h => `<th>${escapeHtml(h)}</th>`).join('');
            const tr = rows.map(row =>
              `<tr>${row.map(cell => `<td class="${cell === 'null' ? 'null' : ''}">${escapeHtml(String(cell))}</td>`).join('')}</tr>`
            ).join('');
            body = `<table class="data-grid"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
          }
        } else if (r.type === 'text') {
          body = `<div class="text-output success">${escapeHtml(r.content)}</div>`;
        } else if (r.type === 'exit') {
          body = `<div class="text-output success">${escapeHtml(r.content)}</div>`;
        }
        return `<div><div class="query-tag">${escapeHtml(r.query)}</div>${body}</div>`;
      }).join('');

      resultsPanel.innerHTML = `<div class="multi-results">${html}</div>`;
    }

    function clearEditor() {
      editor.value = '';
      const active = getActiveTab();
      if (active) active.content = '';
      editor.focus();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Keyboard shortcuts ─────────────────────────────────────────────────────
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        executeQuery();
      }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    renderTabs();
    loadTables();
    editor.focus();
  </script>
</body>
</html>
